spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  rabbitmq:
    host: localhost
    port: 5672

rabbitmq:
  exchange: devsu.exchange
  queue:
    cliente-creado: cliente.creado.queue
    cliente-eliminado: cliente.eliminado.queue
    cliente-actualizado: cliente.actualizado
  routing-key:
    cliente-creado: cliente.creado
    cliente-eliminado: cliente.eliminado
    cliente-actualizado: cliente.actualizado
